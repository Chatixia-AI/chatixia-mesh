# nginx reverse proxy for chatixia-mesh registry
# TLS termination + WebSocket upgrade

upstream registry {
    server 127.0.0.1:8080;
}

server {
    listen 443 ssl;
    server_name mesh.chatixia.local;

    ssl_certificate /etc/letsencrypt/live/mesh.chatixia.local/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mesh.chatixia.local/privkey.pem;

    # WebSocket upgrade
    location /ws {
        proxy_pass http://registry;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # API and static files
    location / {
        proxy_pass http://registry;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
